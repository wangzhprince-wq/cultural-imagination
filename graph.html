    <style>
        :root {
            --bg: #0d0f14; --theorist: #4a9eff; --concept: #f5a623; --place: #4ecdc4;
            --phenomenon: #ff6b9d; --event: #9b8db0; --medium: #c084fc; --work: #86efac;
            --text: #e8e8e8; --text-dim: rgba(255,255,255,0.5); --panel-bg: rgba(15, 17, 23, 0.98);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }
        .nav { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: rgba(13,15,20,0.95); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 200; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .nav h1 { font-size: 1rem; font-weight: 600; }
        .nav-links { display: flex; gap: 20px; font-size: 0.8rem; }
        .nav-links a { color: rgba(255,255,255,0.4); text-decoration: none; }
        .nav-links a:hover, .nav-links a.active { color: #fff; }
        .controls { position: fixed; top: 60px; left: 15px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .controls-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .filter-group { display: flex; gap: 6px; flex-wrap: wrap; max-width: 420px; }
        .filter-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); padding: 6px 12px; border-radius: 16px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
        .filter-btn:hover { background: rgba(255,255,255,0.12); }
        .filter-btn.active { background: rgba(233,69,96,0.25); border-color: rgba(233,69,96,0.5); color: #fff; }
        .mode-toggle { display: flex; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; }
        .mode-btn { background: none; border: none; color: rgba(255,255,255,0.4); padding: 8px 14px; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .mode-btn:hover { color: #fff; }
        .mode-btn.active { background: rgba(233,69,96,0.25); color: #fff; }
        .mode-btn svg { width: 14px; height: 14px; }
        .search-box { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 8px 14px; display: flex; align-items: center; gap: 8px; width: 200px; }
        .search-box input { background: none; border: none; outline: none; color: #fff; font-size: 0.8rem; width: 100%; }
        .search-box input::placeholder { color: rgba(255,255,255,0.3); }
        #graph { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        .tooltip { position: fixed; background: var(--panel-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px 18px; pointer-events: none; z-index: 150; display: none; max-width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        .tooltip h3 { font-size: 0.95rem; margin-bottom: 4px; }
        .tooltip .sublabel { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 8px; }
        .tooltip .quote { font-size: 0.75rem; font-style: italic; color: rgba(255,255,255,0.5); border-left: 2px solid rgba(233,69,96,0.4); padding-left: 10px; }
        .detail-panel { position: fixed; top: 0; right: -350px; width: 340px; height: 100vh; background: var(--panel-bg); border-left: 1px solid rgba(255,255,255,0.08); z-index: 180; transition: right 0.3s ease; overflow-y: auto; padding: 70px 20px 30px; }
        .detail-panel.open { right: 0; }
        .detail-close { position: absolute; top: 60px; right: 15px; background: none; border: none; color: rgba(255,255,255,0.4); font-size: 1.5rem; cursor: pointer; }
        .detail-content { padding: 0 5px; }
        .detail-content h2 { font-size: 1.2rem; margin-bottom: 4px; }
        .detail-content .sublabel { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 15px; }
        .detail-content .work { font-size: 0.75rem; color: #e94560; margin-bottom: 15px; padding: 8px 12px; background: rgba(233,69,96,0.1); border-radius: 8px; }
        .detail-content .core { font-size: 0.85rem; line-height: 1.7; color: rgba(255,255,255,0.8); margin-bottom: 15px; }
        .detail-content .tension { font-size: 0.8rem; padding: 10px 14px; background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2); border-radius: 8px; color: rgba(255,255,255,0.7); margin-bottom: 20px; }
        .detail-content .tension h4 { font-size: 0.7rem; color: #f5a623; margin-bottom: 6px; }
        .detail-content .related { border-top: 1px solid rgba(255,255,255,0.08); padding-top: 15px; }
        .detail-content .related h4 { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 10px; }
        .related-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 0.8rem; color: rgba(255,255,255,0.6); cursor: pointer; transition: color 0.2s; }
        .related-item:hover { color: #fff; }
        .related-dot { width: 8px; height: 8px; border-radius: 50%; }
        .legend { position: fixed; bottom: 20px; left: 15px; background: rgba(15,17,23,0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px 16px; z-index: 100; font-size: 0.7rem; }
        .legend-title { font-weight: 600; margin-bottom: 8px; color: rgba(255,255,255,0.5); }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .legend-dot.theorist { background: var(--theorist); }
        .legend-dot.concept { background: var(--concept); }
        .legend-dot.place { background: var(--place); }
        .legend-dot.phenomenon { background: var(--phenomenon); }
        .legend-dot.event { background: var(--event); }
        .legend-dot.medium { background: var(--medium); }
        .legend-dot.work { background: var(--work); }
        .legend-sep { margin: 10px 0; border-top: 1px solid rgba(255,255,255,0.06); }
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 170; display: none; }
        .overlay.show { display: block; }
        .node { cursor: pointer; }
        .node-circle { stroke-width: 2px; transition: all 0.2s; }
        .node-label { font-size: 11px; fill: rgba(255,255,255,0.7); text-anchor: middle; pointer-events: none; }
        .node-humansolo .node-circle { stroke-dasharray: 4,2; stroke-width: 3px; }
        .tree-hint { position: fixed; top: 110px; left: 15px; background: rgba(192,132,252,0.15); border: 1px solid rgba(192,132,252,0.3); color: rgba(255,255,255,0.7); padding: 8px 14px; border-radius: 8px; font-size: 0.75rem; z-index: 100; display: none; }
        .tree-hint.show { display: block; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(192,132,252,0.9); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; z-index: 200; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }
        @media (max-width: 768px) { .detail-panel { width: 100%; right: -100%; } .filter-group { max-width: 200px; } .search-box { width: 150px; } }

<script>
const graphData = {"nodes":[{"id":"anderson","label":"本尼迪克特·安德森","sublabel":"Benedict Anderson","type":"theorist","group":"theory","size":4,"detail":{"work":"《想象的共同体》(1983)","quote":"民族是一个想象的政治共同体——即使是最小的民族，成员也不可能认识大多数同胞，但在他们心中却存在着关于这个共同体的想象。","core":"印刷资本主义（小说+报纸）创造了'同时性'体验——陌生人在同一时间读同一份报纸，想象他们是同一个民族。这是民族认同的技术基础。","tension":"安德森最大的盲点：他几乎没有谈论数字时代的民族主义。"}},{"id":"foucault","label":"米歇尔·福柯","sublabel":"Michel Foucault","type":"theorist","group":"theory","size":4,"detail":{"work":"《不同空间的正文与上下文》(1967)","quote":"有在其他文化中真实存在的地方——真实的地方，是从社会实在中形成的地方。","core":"异托邦(Heterotopia)是真实存在的'他者空间'，与乌托邦相对。如修道院、墓地、殖民地、花园。","tension":""}},{"id":"halbwachs","label":"莫里斯·哈布瓦赫","sublabel":"Maurice Halbwachs","type":"theorist","group":"theory","size":3,"detail":{"work":"《集体记忆》(1925)","quote":"我们过去的所有记忆都是重建的结果。","core":"记忆不是被'保存'，而是被'重构'。现在社会框架决定我们如何回忆过去。","tension":""}},{"id":"assmann","label":"扬·阿斯曼","sublabel":"Jan Assmann","type":"theorist","group":"theory","size":3,"detail":{"work":"《文化记忆》(1992)","quote":"文化记忆通过固定的符号和仪式来传承，跨越世代。","core":"区分'交流记忆'和文化记忆。冷记忆高度仪式化；热记忆不断被改写激活。","tension":""}},{"id":"hall","label":"斯图亚特·霍尔","sublabel":"Stuart Hall","type":"theorist","group":"theory","size":3,"detail":{"work":"《文化身份与族裔》(1990)","quote":"文化身份不是固定本质，不是等待被发现的东西。","core":"身份是持续'成为'的过程，而非固定'是'的状态。","tension":""}},{"id":"campbell","label":"约瑟夫·坎贝尔","sublabel":"Joseph Campbell","type":"theorist","group":"theory","size":3,"detail":{"work":"《千面英雄》(1949)","quote":"英雄之旅是对分离-启蒙-回归这一公式的放大。","core":"所有神话英雄经历相同的结构：离开→历险→归来。这是人类共同的神话遗产。","tension":"坎贝尔被批评把西方男性英雄神话强加为人类共同结构。"}},{"id":"fei_xiaotong","label":"费孝通","sublabel":"Fei Xiaotong","type":"theorist","group":"theory","size":3,"detail":{"work":"《乡土中国》(1947)","quote":"中国传统社会结构是差序格局，以'己'为中心向外推。","core":"乡土中国的社会结构像石子投入水面形成的波纹，以'己'为中心层层外推。","tension":""}},{"id":"ge_zhaoguang","label":"葛兆光","sublabel":"Ge Zhaoguang","type":"theorist","group":"theory","size":2,"detail":{"work":"中国思想史研究","quote":"中国思想史需要'边界意识'。","core":"质疑安德森框架的普世性：中国传统'天下'观与近代民族国家之间存在根本张力。","tension":""}},{"id":"wang_hui","label":"汪晖","sublabel":"Wang Hui","type":"theorist","group":"theory","size":2,"detail":{"work":"现代中国思想史研究","quote":"需要超越单一民族国家框架。","core":"关注'跨体系'的社会网络与文化流动。","tension":""}},{"id":"said","label":"爱德华·萨义德","sublabel":"Edward Said","type":"theorist","group":"theory","size":3,"detail":{"work":"《东方主义》1978","quote":"东方是被制造出来的，不是被发现的。","core":"西方关于'东方'的想象是权力-知识体系的产物，为殖民统治提供合法性。","tension":""}},{"id":"bhabha","label":"霍米·巴巴","sublabel":"Homi Bhabha","type":"theorist","group":"theory","size":3,"detail":{"work":"《文化的定居》1994","quote":"混杂性是殖民权力最具颠覆性的时刻。","core":"'差一点'的缝隙产生杂糅（hybridity），是文化颠覆的空间。第三空间。","tension":""}},{"id":"appadurai","label":"阿尔君·阿帕杜莱","sublabel":"Arjun Appadurai","type":"theorist","group":"theory","size":2,"detail":{"work":"《消散的现代性》1996","quote":"想象力已经成为一种社会实践。","core":"全球化通过五种'流'（scapes）运作：族群流、媒体流、技术流、金融流、意识形态流。","tension":""}},{"id":"bourdieu","label":"皮埃尔·布尔迪厄","sublabel":"Pierre Bourdieu","type":"theorist","group":"theory","size":3,"detail":{"work":"《区隔》1979","quote":"品味是阶级的自然化。","core":"文化资本：知识、审美、教育背景是可以积累和换算的资本形式。惯习。","tension":""}},{"id":"gramsci","label":"安东尼奥·葛兰西","sublabel":"Antonio Gramsci","type":"theorist","group":"theory","size":2,"detail":{"work":"《狱中札记》1929-1935","quote":"旧世界正在死去，新世界还未诞生。","core":"文化霸权（hegemony）：统治阶级通过'同意的组织'让被统治者自愿接受统治合法性。","tension":""}},{"id":"benjamin","label":"瓦尔特·本雅明","sublabel":"Walter Benjamin","type":"theorist","group":"theory","size":3,"detail":{"work":"《机械复制时代的艺术作品》1935","quote":"每一件文化文明的记录同时也是野蛮的记录。","core":"灵韵（Aura）：艺术作品的'此时此地'性，机械复制使灵韵消失。","tension":""}},{"id":"debord","label":"居伊·德波","sublabel":"Guy Debord","type":"theorist","group":"theory","size":2,"detail":{"work":"《景观社会》1967","quote":"曾经被直接经历的一切，都退隐为一种表象。","core":"景观不是图像的集合，而是人与人之间由图像中介的社会关系。","tension":""}},{"id":"barthes","label":"罗兰·巴特","sublabel":"Roland Barthes","type":"theorist","group":"theory","size":2,"detail":{"work":"《神话学》1957","quote":"神话的功能是把历史变成自然。","core":"神话是第二层次的符号系统，把特定历史意义自然化。作者已死。","tension":""}},{"id":"turner","label":"维克多·特纳","sublabel":"Victor Turner","type":"theorist","group":"theory","size":2,"detail":{"work":"《仪式过程》1969","quote":"阈限期间，什么都可能，一切都是实验。","core":"深化了'阈限'（liminality）概念，阈限期产生'公社'（communitas）。","tension":""}},{"id":"eliade","label":"米尔恰·伊利亚德","sublabel":"Mircea Eliade","type":"theorist","group":"theory","size":2,"detail":{"work":"《神圣与世俗》1957","quote":"人类不能在没有神圣空间的情况下生活。","core":"神圣空间是宇宙轴心（axis mundi）所在。世俗化不能消除对神圣的渴望。","tension":""}},{"id":"jung","label":"卡尔·荣格","sublabel":"Carl G. Jung","type":"theorist","group":"theory","size":2,"detail":{"work":"《原型与集体无意识》1934","quote":"我们并非来自我们的意识，而是来自那个产生了意识的黑暗。","core":"集体无意识储存着人类共同的原型（archetype）。","tension":""}},{"id":"castoriadis","label":"科内利尤斯·卡斯托里亚迪斯","sublabel":"Cornelius Castoriadis","type":"theorist","group":"theory","size":2,"detail":{"work":"《社会的想象性建制》1975","quote":"社会通过想象创造自身。","core":"每个社会都有一套核心的'想象性意指'，使该社会作为统一体存在。","tension":""}},{"id":"taylor","label":"查尔斯·泰勒","sublabel":"Charles Taylor","type":"theorist","group":"theory","size":2,"detail":{"work":"《现代社会想象》2004","quote":"社会想象是人们借以理解自身社会存在的方式。","core":"三种现代社会想象：市场经济、公共领域，人民自治。","tension":""}},{"id":"nora","label":"皮埃尔·诺拉","sublabel":"Pierre Nora","type":"theorist","group":"theory","size":2,"detail":{"work":"《记忆之场》1984-1992","quote":"我们说记忆之场，是因为真正的记忆环境已经不存在了。","core":"记忆之场（lieux de mémoire）：当真实集体记忆消失时，用具体场所替代。","tension":""}},{"id":"bachelard","label":"加斯东·巴什拉","sublabel":"Gaston Bachelard","type":"theorist","group":"theory","size":2,"detail":{"work":"《空间的诗学》1958","quote":"家是我们在世界上第一个宇宙。","core":"空间不是中性的容器，而是人类存在的诗性现象。栖居（dwelling）先于空间的客观测量。","tension":""}},{"id":"girard","label":"勒内·吉拉尔","sublabel":"René Girard","type":"theorist","group":"theory","size":2,"detail":{"work":"《暴力与神圣》1972","quote":"人类的欲望本质上是模仿性的。","core":"模仿欲望产生竞争，竞争产生暴力，暴力通过替罪羊机制化解。","tension":""}},{"id":"spivak","label":"佳亚特里·斯皮瓦克","sublabel":"Gayatri Spivak","type":"theorist","group":"theory","size":2,"detail":{"work":"《属下能说话吗？》1988","quote":"属下不能说话。","core":"属下（subaltern）没有任何表达自身的渠道。","tension":""}},{"id":"ricoeur","label":"保罗·利科","sublabel":"Paul Ricoeur","type":"theorist","group":"theory","size":2,"detail":{"work":"《记忆、历史、遗忘》2000","quote":"人是会讲故事的存在。","core":"叙事身份：自我是在讲述生命故事的过程中构成的。","tension":""}},{"id":"liang_qichao","label":"梁启超","sublabel":"Liang Qichao","type":"theorist","group":"theory","size":2,"detail":{"work":"《新民说》1902","quote":"今日之中国，非昔日之中国也。","core":"第一个将'民族'概念系统引入中国的思想家，创办《时务报》。","tension":""}},{"id":"li_zehou","label":"李泽厚","sublabel":"Li Zehou","type":"theorist","group":"theory","size":2,"detail":{"work":"《美的历程》1981","quote":"情感是理性的基础，而非其对立面。","core":"历史积淀说：人类的感性形式是历史实践积淀的结果。","tension":""}},{"id":"zhao_tingyang","label":"赵汀阳","sublabel":"Zhao Tingyang","type":"theorist","group":"theory","size":2,"detail":{"work":"《天下体系》2005","quote":"天下是一个没有外部的世界。","core":"以天下概念提出替代性全球秩序方案。","tension":""}},{"id":"imagined_community","label":"想象的共同体","sublabel":"Imagined Community","type":"concept","group":"theory","size":4,"detail":{"work":"Anderson, 1983","quote":"民族是想象的政治共同体。","core":"安德森的核心概念。民族作为'想象的'不是因为它'虚假'，而是因为它的成员永远不可能认识所有同胞。","tension":""}},{"id":"heterotopia","label":"异托邦","sublabel":"Heterotopia","type":"concept","group":"theory","size":3,"detail":{"work":"Foucault, 1967","quote":"异托邦是在所有文化中真实存在的地方。","core":"与乌托邦相对。异托邦是真实存在的他者空间，如墓地、花园、殖民地。","tension":""}},{"id":"cultural_memory","label":"文化记忆","sublabel":"Cultural Memory","type":"concept","group":"theory","size":3,"detail":{"work":"Assmann, 1992","quote":"文化记忆通过固定的符号和仪式来传承，跨越世代。","core":"与交流记忆相对。文化记忆通过文本、仪式、纪念物固定传承。","tension":""}},{"id":"identity_becoming","label":"身份是成为","sublabel":"Identity as Becoming","type":"concept","group":"theory","size":2,"detail":{"work":"Hall, 1990","quote":"身份不是固定本质，而是持续'成为'的过程。","core":"身份通过话语实践被生产出来。","tension":""}},{"id":"heros_journey","label":"英雄之旅","sublabel":"Hero's Journey","type":"concept","group":"theory","size":3,"detail":{"work":"Campbell, 1949","quote":"英雄之旅是对分离-启蒙-回归公式的放大。","core":"所有神话英雄经历相同的结构：离开→历险→归来。","tension":""}},{"id":"tianxia","label":"天下体系","sublabel":"Tianxia System","type":"concept","group":"compare","size":3,"detail":{"work":"《诗经》","quote":"普天之下，莫非王土；率土之滨，莫非王臣。","core":"以华为中心的世界秩序想象，通过朝贡制度运作。","tension":"当代'人类命运共同体'是否只是天下观念的现代表达？"}},{"id":"print_capitalism","label":"印刷资本主义","sublabel":"Print Capitalism","type":"concept","group":"theory","size":3,"detail":{"work":"Anderson, 1983","quote":"印刷资本主义使'同时性'成为可能。","core":"16世纪印刷革命创造了统一语言，为民族认同奠定技术基础。","tension":""}},{"id":"orientalism","label":"东方主义","sublabel":"Orientalism","type":"concept","group":"theory","size":3,"detail":{"work":"Said, 1978","core":"西方关于'东方'的系统性话语，是西方自我确认需要的他者构建。","tension":""}},{"id":"third_space","label":"第三空间","sublabel":"Third Space","type":"concept","group":"theory","size":2,"detail":{"work":"Bhabha, 1994","core":"文化意义在翻译和混杂中产生，即'第三空间'。","tension":""}},{"id":"liminality","label":"阈限","sublabel":"Liminality","type":"concept","group":"theory","size":3,"detail":{"work":"Turner, 1969","quote":"阈限期间，什么都可能。","core":"处于两种身份之间的模糊状态。终南山隐士是典型的阈限空间。","tension":"数字游民、躺平者是否停留在一个永不完成通过仪式的状态中？"}},{"id":"mimetic_desire","label":"模仿欲望","sublabel":"Mimetic Desire","type":"concept","group":"theory","size":2,"detail":{"work":"Girard, 1961","quote":"人类的欲望本质上是模仿性的。","core":"欲望不是自发的，而是通过模仿他人产生的。内卷是模仿欲望的集体发作。","tension":""}},{"id":"cultural_capital","label":"文化资本","sublabel":"Cultural Capital","type":"concept","group":"theory","size":2,"detail":{"work":"Bourdieu, 1979","quote":"品味是阶级的自然化。","core":"文化资本有三种形式：具身化、客体化、制度化。","tension":""}},{"id":"hegemony","label":"文化霸权","sublabel":"Hegemony","type":"concept","group":"theory","size":2,"detail":{"work":"Gramsci, 1929-35","quote":"统治不只靠强制，更靠'同意的组织'。","core":"文化霸权通过教育、媒体、宗教等运作。","tension":""}},{"id":"aura","label":"灵韵","sublabel":"Aura","type":"concept","group":"theory","size":2,"detail":{"work":"Benjamin, 1935","core":"艺术品的'此时此地'性，机械复制使灵韵消亡。","tension":""}},{"id":"sites_of_memory","label":"记忆之场","sublabel":"Lieux de mémoire","type":"concept","group":"theory","size":2,"detail":{"work":"Nora, 1984","cor
