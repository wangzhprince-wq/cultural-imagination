<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 文化想象 - 知识图谱</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg: #0d0f14;
            --theorist: #4a9eff;
            --concept: #f5a623;
            --place: #4ecdc4;
            --phenomenon: #ff6b9d;
            --event: #9b8db0;
            --edge-influences: rgba(74, 158, 255, 0.4);
            --edge-contrasts: rgba(255, 74, 74, 0.4);
            --edge-applies: rgba(78, 205, 196, 0.4);
            --edge-critiques: rgba(245, 166, 35, 0.4);
            --edge-compares: rgba(136, 136, 136, 0.4);
            --text: #e8e8e8;
            --text-dim: rgba(255,255,255,0.5);
            --panel-bg: rgba(15, 17, 23, 0.98);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }
        
        /* Nav */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(13, 15, 20, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 200;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .nav h1 {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
        }
        
        .nav-links a {
            color: rgba(255,255,255,0.4);
            text-decoration: none;
        }
        
        .nav-links a:hover, .nav-links a.active { color: #fff; }
        
        /* Controls */
        .controls {
            position: fixed;
            top: 60px;
            left: 15px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .filter-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-width: 300px;
        }
        
        .filter-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.6);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover { background: rgba(255,255,255,0.12); }
        .filter-btn.active { background: rgba(233,69,96,0.25); border-color: rgba(233,69,96,0.5); color: #fff; }
        
        .search-box {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 200px;
        }
        
        .search-box input {
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-size: 0.8rem;
            width: 100%;
        }
        
        .search-box input::placeholder { color: rgba(255,255,255,0.3); }
        
        /* Graph */
        #graph {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        /* Tooltip */
        .tooltip {
            position: fixed;
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 18px;
            pointer-events: none;
            z-index: 150;
            display: none;
            max-width: 280px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        
        .tooltip h3 {
            font-size: 0.95rem;
            margin-bottom: 4px;
        }
        
        .tooltip .sublabel {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        
        .tooltip .quote {
            font-size: 0.75rem;
            font-style: italic;
            color: rgba(255,255,255,0.5);
            border-left: 2px solid rgba(233,69,96,0.4);
            padding-left: 10px;
        }
        
        /* Detail Panel */
        .detail-panel {
            position: fixed;
            top: 0;
            right: -350px;
            width: 340px;
            height: 100vh;
            background: var(--panel-bg);
            border-left: 1px solid rgba(255,255,255,0.08);
            z-index: 180;
            transition: right 0.3s ease;
            overflow-y: auto;
            padding: 70px 20px 30px;
        }
        
        .detail-panel.open { right: 0; }
        
        .detail-close {
            position: absolute;
            top: 60px;
            right: 15px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .detail-content { padding: 0 5px; }
        
        .detail-content h2 {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }
        
        .detail-content .sublabel {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 15px;
        }
        
        .detail-content .work {
            font-size: 0.75rem;
            color: #e94560;
            margin-bottom: 15px;
            padding: 8px 12px;
            background: rgba(233,69,96,0.1);
            border-radius: 8px;
        }
        
        .detail-content .core {
            font-size: 0.85rem;
            line-height: 1.7;
            color: rgba(255,255,255,0.8);
            margin-bottom: 15px;
        }
        
        .detail-content .tension {
            font-size: 0.8rem;
            padding: 10px 14px;
            background: rgba(245,166,35,0.1);
            border: 1px solid rgba(245,166,35,0.2);
            border-radius: 8px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 20px;
        }
        
        .detail-content .tension h4 {
            font-size: 0.7rem;
            color: #f5a623;
            margin-bottom: 6px;
        }
        
        .detail-content .related {
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 15px;
        }
        
        .detail-content .related h4 {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 10px;
        }
        
        .related-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .related-item:hover { color: #fff; }
        
        .related-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        /* Legend */
        .legend {
            position: fixed;
            bottom: 20px;
            left: 15px;
            background: rgba(15, 17, 23, 0.9);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 16px;
            z-index: 100;
            font-size: 0.7rem;
        }
        
        .legend-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.5);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .legend-dot.theorist { background: var(--theorist); }
        .legend-dot.concept { background: var(--concept); }
        .legend-dot.place { background: var(--place); }
        .legend-dot.phenomenon { background: var(--phenomenon); }
        .legend-dot.event { background: var(--event); }
        
        .legend-line {
            width: 20px;
            height: 2px;
        }
        
        .legend-line.influences { background: var(--theorist); }
        .legend-line.contrasts { background: var(--phenomenon); border: 1px dashed var(--phenomenon); height: 0; }
        .legend-line.applies { background: var(--place); }
        .legend-line.critiques { background: var(--concept); border: 1px dashed var(--concept); height: 0; }
        .legend-line.compares { background: rgba(136,136,136,0.5); border: 1px dotted rgba(136,136,136,0.5); height: 0; }
        
        .legend-sep {
            margin: 10px 0;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        
        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 170;
            display: none;
        }
        
        .overlay.show { display: block; }
        
        /* Node styles */
        .node { cursor: pointer; }
        
        .node-circle {
            stroke-width: 2px;
            transition: all 0.2s;
        }
        
        .node-label {
            font-size: 11px;
            fill: rgba(255,255,255,0.7);
            text-anchor: middle;
            pointer-events: none;
        }
        
        /* Edge label */
        .edge-label {
            font-size: 9px;
            fill: rgba(255,255,255,0.35);
            text-anchor: middle;
            pointer-events: none;
            display: none;
        }
        
        /* Special node: humansolo */
        .node-humansolo .node-circle {
            stroke-dasharray: 4,2;
            stroke-width: 3px;
        }
        
        @media (max-width: 768px) {
            .detail-panel { width: 100%; right: -100%; }
            .filter-group { max-width: 200px; }
            .search-box { width: 150px; }
        }
    </style>
</head>

// ============================================================
// 渲染代码（一般不需要修改）
// ============================================================

// 颜色映射
const typeColors = {
    theorist: '#4a9eff',
    concept: '#f5a623',
    place: '#4ecdc4',
    phenomenon: '#ff6b9d',
    event: '#9b8db0'
};

const edgeColors = {
    influences: 'rgba(74, 158, 255, 0.5)',
    contrasts: 'rgba(255, 74, 74, 0.5)',
    applies: 'rgba(78, 205, 196, 0.5)',
    critiques: 'rgba(245, 166, 35, 0.5)',
    compares: 'rgba(136, 136, 136, 0.4)'
};

const edgeDash = {
    influences: '0',
    contrasts: '6,3',
    applies: '0',
    critiques: '4,4',
    compares: '2,4'
};

// 节点半径
function nodeRadius(d) {
    return [0, 16, 22, 30, 40][d.size] || 16;
}

// 全局变量
let svg, container, simulation, nodes, edges, nodeElements, edgeElements;
let width, height;
let selectedNode = null;
let activeGroup = 'all';
let searchQuery = '';

// 初始化
function init() {
    width = window.innerWidth;
    height = window.innerHeight;
    
    svg = d3.select('#graph')
        .attr('width', width)
        .attr('height', height);
    
    // Defs for arrow markers
    const defs = svg.append('defs');
    
    ['influences', 'applies'].forEach(type => {
        defs.append('marker')
            .attr('id', `arrow-${type}`)
            .attr('viewBox', '0 -5 10 10')
            .attr('refX', 25)
            .attr('refY', 0)
            .attr('markerWidth', 6)
            .attr('markerHeight', 6)
            .attr('orient', 'auto')
            .append('path')
            .attr('fill', edgeColors[type])
            .attr('d', 'M0,-5L10,0L0,5');
    });
    
    container = svg.append('g');
    
    // 复制数据
    const nodesCopy = graphData.nodes.map(d => ({...d}));
    const edgesCopy = graphData.edges.map(d => ({...d}));
    
    // 模拟
    simulation = d3.forceSimulation(nodesCopy)
        .force('link', d3.forceLink(edgesCopy).id(d => d.id).distance(150))
        .force('charge', d3.forceManyBody().strength(-500))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 30));
    
    // 边
    edges = container.append('g').attr('class', 'edges')
        .selectAll('line')
        .data(edgesCopy)
        .enter().append('line')
        .attr('stroke', d => edgeColors[d.type])
        .attr('stroke-width', 1.5)
        .attr('stroke-dasharray', d => edgeDash[d.type])
        .attr('marker-end', d => (d.type === 'influences' || d.type === 'applies') ? `url(#arrow-${d.type})` : null);
    
    // 边标签
    edgeElements = container.append('g').attr('class', 'edge-labels')
        .selectAll('text')
        .data(edgesCopy)
        .enter().append('text')
        .attr('class', 'edge-label')
        .text(d => d.label)
        .attr('fill', 'rgba(255,255,255,0.3)')
        .attr('font-size', '9px');
    
    // 节点组
    const nodeGroup = container.append('g').attr('class', 'nodes')
        .selectAll('g')
        .data(nodesCopy)
        .enter().append('g')
        .attr('class', d => `node node-${d.type}${d.id === 'humansolo' ? ' node-humansolo' : ''}`)
        .call(d3.drag()
            .on('start', dragStarted)
            .on('drag', dragged)
            .on('end', dragEnded));
    
    // 节点圆
    nodeElements = nodeGroup.append('circle')
        .attr('class', 'node-circle')
        .attr('r', d => nodeRadius(d))
        .attr('fill', d => typeColors[d.type])
        .attr('stroke', d => typeColors[d.type])
        .attr('fill-opacity', 0.8);
    
    // 特殊处理humansolo
    nodeGroup.filter(d => d.id === 'humansolo')
        .select('.node-circle')
        .attr('stroke-dasharray', '4,2')
        .attr('stroke-width', 3);
    
    // 节点标签
    nodeGroup.append('text')
        .attr('class', 'node-label')
        .text(d => d.label)
        .attr('dy', d => nodeRadius(d) + 14);
    
    // 交互
    nodeGroup
        .on('mouseover', showTooltip)
        .on('mousemove', moveTooltip)
        .on('mouseout', hideTooltip)
        .on('click', clickNode);
    
    // 更新位置
    simulation.on('tick', () => {
        edges
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
        
        edgeElements
            .attr('x', d => (d.source.x + d.target.x) / 2)
            .attr('y', d => (d.source.y + d.target.y) / 2);
        
        nodeGroup.attr('transform', d => `translate(${d.x},${d.y})`);
    });
    
    // 缩放
    const zoom = d3.zoom()
        .scaleExtent([0.3, 3])
        .on('zoom', (event) => {
            container.attr('transform', event.transform);
        });
    
    svg.call(zoom);
    
    // 事件监听
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => filterByGroup(btn.dataset.group));
    });
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        updateVisibility();
    });
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closePanel();
    });
}

// Tooltip
function showTooltip(event, d) {
    document.getElementById('tooltip-title').textContent = d.label;
    document.getElementById('tooltip-sublabel').textContent = d.sublabel;
    const quoteEl = document.getElementById('tooltip-quote');
    if (d.detail.quote) {
        quoteEl.textContent = d.detail.quote;
        quoteEl.style.display = 'block';
    } else {
        quoteEl.style.display = 'none';
    }
    document.getElementById('tooltip').style.display = 'block';
    moveTooltip(event);
}

function moveTooltip(event) {
    const tooltip = document.getElementById('tooltip');
    tooltip.style.left = (event.pageX + 15) + 'px';
    tooltip.style.top = (event.pageY - 10) + 'px';
}

function hideTooltip() {
    document.getElementById('tooltip').style.display = 'none';
}

// 点击节点
function clickNode(event, d) {
    event.stopPropagation();
    selectedNode = d;
    showDetailPanel(d);
    highlightNeighbors(d);
}

// 详情面板
function showDetailPanel(d) {
    const panel = document.getElementById('detailPanel');
    const content = document.getElementById('detailContent');
    
    // 找到相关边和节点
    const relatedEdges = graphData.edges.filter(e => e.source === d.id || e.target === d.id);
    const relatedNodes = relatedEdges.map(e => {
        const targetId = e.source === d.id ? e.target : e.source;
        return graphData.nodes.find(n => n.id === targetId);
    }).filter(n => n);
    
    let html = `<h2>${d.label}</h2>`;
    html += `<div class="sublabel">${d.sublabel}</div>`;
    
    if (d.detail.work) {
        html += `<div class="work">${d.detail.work}</div>`;
    }
    
    if (d.detail.core) {
        html += `<div class="core">${d.detail.core}</div>`;
    }
    
    if (d.detail.tension) {
        html += `<div class="tension"><h4>⚡ 张力/争议</h4>${d.detail.tension}</div>`;
    }
    
    if (relatedNodes.length > 0) {
        html += `<div class="related"><h4>🔗 相关节点</h4>`;
        relatedNodes.forEach(n => {
            const edge = relatedEdges.find(e => e.source === n.id || e.target === n.id);
            html += `<div class="related-item" onclick="jumpToNode('${n.id}')">
                <span class="related-dot" style="background:${typeColors[n.type]}"></span>
                ${n.label}
                <span style="margin-left:auto;font-size:0.7rem;color:var(--text-dim)">${edge ? edge.label : ''}</span>
            </div>`;
        });
        html += `</div>`;
    }
    
    content.innerHTML = html;
    panel.classList.add('open');
    document.getElementById('overlay').classList.add('show');
}

function jumpToNode(id) {
    const node = simulation.nodes().find(n => n.id === id);
    if (node) {
        selectedNode = node;
        showDetailPanel(node);
        highlightNeighbors(node);
    }
}

function closePanel() {
    document.getElementById('detailPanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
    selectedNode = null;
    resetHighlight();
}

function highlightNeighbors(d) {
    const neighborIds = new Set([d.id]);
    graphData.edges.forEach(e => {
        if (e.source === d.id) neighborIds.add(e.target);
        if (e.target === d.id) neighborIds.add(e.source);
    });
    
    nodeElements.attr('opacity', n => neighborIds.has(n.id) ? 1 : 0.1);
    edges.attr('opacity', e => (e.source.id === d.id || e.target.id === d.id) ? 1 : 0.1);
    
    // 放大选中节点
    nodeElements.attr('r', n => n.id === d.id ? nodeRadius(n) * 1.3 : nodeRadius(n));
}

function resetHighlight() {
    nodeElements.attr('opacity', 1).attr('r', d => nodeRadius(d));
    edges.attr('opacity', 1);
}

// 筛选
function filterByGroup(group) {
    activeGroup = group;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.group === group);
    });
    updateVisibility();
}

function updateVisibility() {
    const nodeData = simulation.nodes();
    
    nodeElements.attr('opacity', n => {
        if (searchQuery && !n.label.toLowerCase().includes(searchQuery) && !n.sublabel.toLowerCase().includes(searchQuery)) {
            return 0.1;
        }
        if (activeGroup === 'all') return 1;
        return n.group === activeGroup ? 1 : 0.1;
    });
    
    edges.attr('opacity', e => {
        if (activeGroup === 'all') return 1;
        const sourceNode = nodeData.find(n => n.id === e.source.id || n.id === e.source);
        const targetNode = nodeData.find(n => n.id === e.target.id || n.id === e.target);
        if (!sourceNode || !targetNode) return 0.1;
        if (activeGroup === 'all') return 1;
        return (sourceNode.group === activeGroup || targetNode.group === activeGroup) ? 1 : 0.1;
    });
}

// 拖拽
function dragStarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
}

function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
}

function dragEnded(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
}

// 初始化
init();

window.addEventListener('resize', () => {
    width = window.innerWidth;
    height = window.innerHeight;
    svg.attr('width', width).attr('height', height);
    simulation.force('center', d3.forceCenter(width / 2, height / 2));
    simulation.alpha(0.3).restart();
});
</script>
