<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🕸️ 文化想象 - 知识图谱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
        }
        
        .nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.98);
            padding: 12px 15px;
            display: flex;
            gap: 15px;
            z-index: 100;
            overflow-x: auto;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .nav-bar a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        
        .nav-bar a:hover, .nav-bar a.active {
            color: #e94560;
        }
        
        .nav-bar .title {
            color: white;
            font-weight: bold;
            margin-right: auto;
        }
        
        .container {
            padding: 70px 15px 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.7;
            font-size: 0.9rem;
        }
        
        .filter {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
        }
        
        .filter-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: white;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1rem;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title.red { border-color: #e94560; }
        .section-title.teal { border-color: #4ecdc4; }
        .section-title.yellow { border-color: #ffe66d; }
        .section-title.blue { border-color: #95e1d3; }
        .section-title.orange { border-color: #f38181; }
        .section-title.purple { border-color: #aa96da; }
        
        .node-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        
        .node {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .node:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-2px);
        }
        
        .node.red { border-color: rgba(233, 69, 96, 0.5); }
        .node.teal { border-color: rgba(78, 205, 196, 0.5); }
        .node.yellow { border-color: rgba(255, 230, 109, 0.5); }
        .node.blue { border-color: rgba(149, 225, 211, 0.5); }
        .node.orange { border-color: rgba(243, 129, 129, 0.5); }
        .node.purple { border-color: rgba(170, 150, 218, 0.5); }
        
        .node-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        
        .node.red .node-dot { background: #e94560; }
        .node.teal .node-dot { background: #4ecdc4; }
        .node.yellow .node-dot { background: #ffe66d; }
        .node.blue .node-dot { background: #95e1d3; }
        .node.orange .node-dot { background: #f38181; }
        .node.purple .node-dot { background: #aa96da; }
        
        .node-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .node-desc {
            font-size: 0.7rem;
            opacity: 0.6;
            line-height: 1.4;
        }
        
        .connections {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .connections h3 {
            font-size: 0.9rem;
            margin-bottom: 10px;
            color: #e94560;
        }
        
        .connection-item {
            font-size: 0.8rem;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 8px;
        }
        
        .connection-item:last-child {
            border-bottom: none;
        }
        
        .connection-arrow {
            color: #e94560;
        }
        
        .legend {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.75rem;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal.show {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 25px;
            max-width: 400px;
            width: 100%;
            border: 1px solid rgba(233, 69, 96, 0.5);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .modal-title {
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            font-size: 1.5rem;
            cursor: pointer;
        }
        
        .modal-category {
            font-size: 0.75rem;
            color: #e94560;
            margin-bottom: 10px;
        }
        
        .modal-desc {
            font-size: 0.9rem;
            line-height: 1.6;
            opacity: 0.8;
        }
        
        .modal-links {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .modal-links h4 {
            font-size: 0.8rem;
            color: #4ecdc4;
            margin-bottom: 8px;
        }
        
        .modal-link {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 4px;
        }
        
        @media (max-width: 480px) {
            .node-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .legend {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

                    { name: "美国", category: "文明/国家", desc: "昭昭天命/美国梦，媒体、好莱坞为载体", links: ["核心概念: Manifest Destiny", "核心概念: 美国梦"] },
                    { name: "欧洲", category: "文明/国家", desc: "启蒙/文明使命，大学、博物馆为载体", links: ["核心概念: 理性、民主", "记忆: 大屠杀纪念"] },
                    { name: "日本", category: "文明/国家", desc: "万世一系/武士道，动漫、文化工业为载体", links: ["核心概念: 天皇制连续性", "文化: 武士道美学"] },
                    { name: "印度", category: "文明/国家", desc: "宗教多元，宝莱坞、节日为载体", links: ["核心: Hindutva", "挑战: 多元vs统一"] }
                ]
            },
            history: {
                title: "🏛️ 历史时期",
                color: "blue",
                items: [
                    { name: "神话时代", category: "历史时期", desc: "美索不达米亚、希腊、印度、中国、犹太-基督教的神话与宗教想象", links: ["美索不达米亚: 创世/洪水", "希腊: 英雄/城邦", "中国: 天命/天下"] },
                    { name: "宗教时代", category: "历史时期", desc: "佛教、基督教、伊斯兰教的传播与本土化", links: ["佛教东传: 印度→中国→日本", "基督教普世主义与扩张"] },

                ]
            },
            phenomenon: {
                title: "💡 现象",
                color: "orange",
                items: [
                    { name: "民族主义", category: "现象", desc: "利用文化符号建构'我们'的群体认同", links: ["符号: 国旗、国歌、节日", "机制: 教育、媒体"] },

                    { name: "异托邦", category: "现象", desc: "真实存在的他者空间（vs 乌托邦）", links: ["例子: 修道院、墓地", "应用: 终南山隐士"] },
                    { name: "天下", category: "现象", desc: "以华为中心的世界秩序，朝贡体系的文化基础", links: ["古代: 天命→天下", "当代: 人类命运共同体"] },
                    { name: "桃花源", category: "现象", desc: "隐逸乌托邦，从陶渊明到当代旅游IP", links: ["陶渊明(5世纪)", "革命根据地", "当代乡村振兴"] },
                    { name: "昭昭天命", category: "现象", desc: "美国白人神圣使命，西部拓张意识形态", links: ["17世纪: 清教想象", "19世纪: 西部拓张"] },
                    { name: "美国梦", category: "现象", desc: "流动性与个人主义，成功的想象", links: ["核心: 自我创造", "批判: 阶级固化"] },
                    { name: "隐士文化", category: "现象", desc: "终南山修行，数字游民，隐居式度假", links: ["古代: 道家/儒家", "当代: 避世商业化"] },
                    { name: "躺平", category: "现象", desc: "2021年哲学化拒绝996的生活方式运动", links: ["背景: 内卷焦虑", "国际对比: 日本低欲望"] },
                    { name: "内卷", category: "现象", desc: "2020年网络热词，竞争死循环", links: ["学术来源: Geertz", "表现: 教育军备竞赛"] }
                ]
            },
            issue: {
                title: "🎯 研究议题",
                color: "purple",
                items: [
                    { name: "国家与共同体", category: "研究议题", desc: "民族主义如何利用文化符号？教育系统如何再生产？", links: ["机制: 符号发明", "争议: 安德森理论适用性"] },
                    { name: "个人主体", category: "研究议题", desc: "个体如何在文化想象中建构身份？归属感与疏离感？", links: ["Stuart Hall身份理论", "案例: 空心病研究"] },
                    { name: "叙事与转译", category: "研究议题", desc: "文化意象如何在历史中被重新叙事？古代符号如何获得当代意义？", links: ["机制: 重新叙事/挪用/杂糅", "案例: 桃花源层叠"] },
                    { name: "想象机制", category: "研究议题", desc: "符号发明与挪用、教育系统、媒体传播", links: ["教育再生产", "市场塑造欲望"] }
                ]
            }
        };
        
        let currentFilter = 'all';
        
        function render() {
            const sections = document.getElementById('sections');
            let html = '';
            
            for (const [key, section] of Object.entries(data)) {
                if (currentFilter !== 'all' && currentFilter !== key) continue;
                
                html += `<div class="section">
                    <h2 class="section-title ${section.color}">${section.title}</h2>
                    <div class="node-grid">`;
                
                for (const item of section.items) {
                    html += `<div class="node ${section.color}" onclick="showNode('${item.name}')">
                        <div class="node-name"><span class="node-dot"></span>${item.name}</div>
                        <div class="node-desc">${item.desc.substring(0, 50)}...</div>
                    </div>`;
                }
                
                html += '</div></div>';
            }
            
            sections.innerHTML = html;
        }
        
        function filterBy(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }
        
        function showAll() {
            currentFilter = 'all';
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.filter-btn').classList.add('active');
            render();
        }
        
        function showNode(name) {
            // Find node data
            let node = null;
            for (const section of Object.values(data)) {
                for (const item of section.items) {
                    if (item.name === name) {
                        node = item;
                        break;
                    }
                }
                if (node) break;
            }
            
            if (!node) return;
            
            document.getElementById('modal-title').textContent = node.name;
            document.getElementById('modal-category').textContent = node.category;
            document.getElementById('modal-desc').textContent = node.desc;
            
            let linksHtml = '<h4>关联</h4>';
            for (const link of node.links) {
                linksHtml += `<div class="modal-link">→ ${link}</div>`;
            }
            document.getElementById('modal-links').innerHTML = linksHtml;
            
            document.getElementById('modal').classList.add('show');
        }
        
        function closeModal(e) {
            if (!e || e.target.id === 'modal') {
                document.getElementById('modal').classList.remove('show');
            }
        }
        
        // Init
        render();
    </script>
</body>
</html>
